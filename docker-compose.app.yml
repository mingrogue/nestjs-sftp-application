version: '3.8'

services:
  # SFTP Source App - Replica 1
  sftp-source-1:
    image: node:20-alpine
    container_name: sftp-source-1
    working_dir: /app
    volumes:
      - ./dist:/app/dist
      - ./node_modules:/app/node_modules
      - ./package.json:/app/package.json
    env_file:
      - ./.env
    command: node dist/main.js
    networks:
      - sftp-concurrency_sftp-network
    restart: unless-stopped

  # SFTP Source App - Replica 2
  sftp-source-2:
    image: node:20-alpine
    container_name: sftp-source-2
    working_dir: /app
    volumes:
      - ./dist:/app/dist
      - ./node_modules:/app/node_modules
      - ./package.json:/app/package.json
    env_file:
      - ./.env
    command: node dist/main.js
    networks:
      - sftp-concurrency_sftp-network
    restart: unless-stopped

  # SFTP Source App - Replica 3
  sftp-source-3:
    image: node:20-alpine
    container_name: sftp-source-3
    working_dir: /app
    volumes:
      - ./dist:/app/dist
      - ./node_modules:/app/node_modules
      - ./package.json:/app/package.json
    env_file:
      - ./.env
    command: node dist/main.js
    networks:
      - sftp-concurrency_sftp-network
    restart: unless-stopped

networks:
  sftp-concurrency_sftp-network:
    external: true
